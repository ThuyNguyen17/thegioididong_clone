<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối | TheGioiDiDong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .error-page { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: #f8f9fa; }
        .error-container { max-width: 600px; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .error-code { font-size: 80px; font-weight: 800; color: #d70018; margin-bottom: 10px; }
        .error-message { font-size: 24px; font-weight: 700; color: #333; margin-bottom: 20px; }
        .btn-home { background: #ffd400; color: #333; font-weight: 700; padding: 12px 30px; border-radius: 10px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-code">403</div>
        <div class="error-message">Bạn không có quyền truy cập trang này!</div>
        <p class="mb-4 text-muted">Vui lòng đăng nhập với tài khoản Admin hoặc quay lại trang chủ.</p>
        <a href="/" class="btn-home">QUAY LẠI TRANG CHỦ</a>
    </div>
</body>
</html>
