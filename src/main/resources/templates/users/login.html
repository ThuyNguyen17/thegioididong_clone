<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | TheGioiDiDong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <link th:href="@{/css/auth.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="/">
                <img th:src="@{/images/logo-dt.png}" alt="Logo" style="height: 50px; margin-bottom: 20px;">
            </a>
            <h1>Mừng bạn trở lại!</h1>
            <p>Đăng nhập để nhận ngay ưu đãi hấp dẫn</p>
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i> Sai tên đăng nhập hoặc mật khẩu.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle me-2"></i> Bạn đã đăng xuất thành công.
            </div>

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <div class="position-relative">
                    <input type="text" class="form-control" required id="username" name="username" placeholder="Nhập tên đăng nhập của bạn">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="position-relative">
                    <input type="password" class="form-control" required id="password" name="password" placeholder="Nhập mật khẩu">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" name="remember-me" id="remember-me">
                    <label class="form-check-label" for="remember-me" style="font-size: 13px;">Ghi nhớ</label>
                </div>
                <a href="#" class="text-info" style="font-size: 13px;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="auth-btn">ĐĂNG NHẬP</button>

            <div class="auth-links">
                Bạn chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
