<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản | TheGioiDiDong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <link th:href="@{/css/auth.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="/">
                <img th:src="@{/images/logo-dt.png}" alt="Logo" style="height: 50px; margin-bottom: 20px;">
            </a>
            <h1>Tạo tài khoản mới</h1>
            <p>Trở thành thành viên để nhận ngàn quà tặng</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="auth-form">
            <div th:if="${errors}" class="alert alert-danger" role="alert">
                <ul class="mb-0">
                    <li th:each="error : ${errors}" th:text="${error}"></li>
                </ul>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" th:field="*{email}" id="email" placeholder="Nhập email của bạn" required>
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" class="form-control" th:field="*{username}" id="username" placeholder="Chọn tên đăng nhập" required>
                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" class="form-control" th:field="*{password}" id="password" placeholder="Mật khẩu tối thiểu 6 ký tự" required>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" class="form-control" th:field="*{phone}" id="phone" placeholder="Số điện thoại của bạn" required>
                <div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>

            <button type="submit" class="auth-btn">ĐĂNG KÝ NGAY</button>

            <div class="auth-links">
                Bạn đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
