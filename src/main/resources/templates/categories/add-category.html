<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .category-create-page {
            max-width: 980px;
            margin: 0 auto;
            padding: 20px 14px 36px;
        }

        .category-create-card {
            background: #fff;
            border: 1px solid #f0e6bf;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .category-create-head {
            padding: 18px 22px;
            background: linear-gradient(120deg, #fff6d9 0%, #fff 100%);
            border-bottom: 1px solid #f2e9c7;
        }

        .category-create-head h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: #1f2937;
        }

        .category-create-head p {
            margin: 6px 0 0;
            color: #6b7280;
            font-size: 14px;
        }

        .category-create-body {
            padding: 20px;
        }

        .category-create-page .form-label {
            font-weight: 700;
            color: #374151;
        }

        .category-create-page .form-control,
        .category-create-page .form-select {
            border-radius: 10px;
            min-height: 42px;
        }

        .preview-box {
            margin-top: 12px;
            width: 170px;
            height: 170px;
            border-radius: 12px;
            border: 1px dashed #d1d5db;
            display: none;
            object-fit: cover;
            background: #fafafa;
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: siteHeader}"></th:block>

<section class="category-create-page">
    <div class="category-create-card">
        <div class="category-create-head">
            <h1>Thêm danh mục</h1>
            <p>Tạo danh mục mới cho phần menu phụ kiện trên header.</p>
        </div>

        <div class="category-create-body">
            <form th:action="@{/categories/add}" th:object="${category}" method="post" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-lg-6">
                        <label for="name" class="form-label">Tên danh mục</label>
                        <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Ví dụ: Camera hành trình">
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="col-lg-6">
                        <label for="groupName" class="form-label">Nhóm hiển thị</label>
                        <select id="groupName" th:field="*{groupName}" class="form-select">
                            <option value="">-- Chọn nhóm --</option>
                            <option value="Camera">Camera</option>
                            <option value="Thiet bi am thanh">Thiết bị âm thanh</option>
                            <option value="Phu kien khac">Phụ kiện khác</option>
                            <option value="Phu kien gaming">Phụ kiện gaming</option>
                        </select>
                        <small class="text-muted">Danh mục có nhóm sẽ xuất hiện trong dropdown "Phụ kiện".</small>
                    </div>

                    <div class="col-lg-6">
                        <label for="imageFile" class="form-label">Hình danh mục</label>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*" class="form-control" onchange="previewImage(event)">
                        <img id="imagePreview" class="preview-box" alt="Xem trước ảnh">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-primary">Lưu danh mục</button>
                    <a th:href="@{/categories}" class="btn btn-outline-secondary">Quay lại danh sách</a>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
    function previewImage(event) {
        const file = event.target.files[0];
        const preview = document.getElementById('imagePreview');
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        } else {
            preview.src = '';
            preview.style.display = 'none';
        }
    }
</script>
</body>
</html>
