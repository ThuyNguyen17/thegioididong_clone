<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title th:text="${title} ?: 'Categories List'"> Categories List </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body>
<th:block th:replace="~{fragments/header :: siteHeader}"></th:block>
<main class="product-page-shell">
    <section layout:fragment="content">
        <h1>Categories List</h1>
        <div sec:authorize="hasAuthority('ADMIN')">
            <a th:href="@{/categories/add}" class="btn btn-primary mb-3">Add New
                Category</a>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Group</th>
                <th>Image</th>
                <th sec:authorize="hasAuthority('ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}"></td>
                <td th:text="${category.name}"></td>
                <td th:text="${category.groupName} ?: '-'"></td>
                <td>
                    <img th:if="${category.imageUrl != null and !#strings.isEmpty(category.imageUrl)}"
                         th:src="@{/images/{img}(img=${category.imageUrl})}"
                         alt="Category image"
                         style="width: 44px; height: 44px; border-radius: 6px; object-fit: cover;">
                    <span th:unless="${category.imageUrl != null and !#strings.isEmpty(category.imageUrl)}">-</span>
                </td>
                <td sec:authorize="hasAuthority('ADMIN')">
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn
btn-success btn-sm">Edit</a>
                    <a th:href="@{/categories/delete/{id}(id=${category.id})}"
                       class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
