<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi | TheGioiDiDong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f8f9fa;
        }
        .error-container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: #ffd400;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .error-message {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }
        .error-description {
            color: #666;
            margin-bottom: 30px;
        }
        .btn-home {
            background: #ffd400;
            color: #333;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: #ffc400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 212, 0, 0.3);
            color: #000;
        }
    </style>
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-code" th:text="${status != null ? status : 'Oops!'}">404</div>
        <div class="error-message">Đã có lỗi xảy ra</div>
        <div class="error-description">
            Chúng tôi xin lỗi, nhưng trang bạn đang tìm kiếm không tồn tại hoặc có lỗi trong quá trình xử lý. 
            Vui lòng kiểm tra lại kết nối cơ sở dữ liệu (MySQL) hoặc quay lại trang chủ.
        </div>
        <a href="/" class="btn-home">QUAY LẠI TRANG CHỦ</a>
    </div>
</body>
</html>
