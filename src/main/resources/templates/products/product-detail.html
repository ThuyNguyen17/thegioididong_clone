<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Chi tiết sản phẩm'">Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <style>
        .product-detail-shell { max-width: 1240px; margin: 24px auto; padding: 0 12px; }
        .detail-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .breadcrumb-wrap { margin-bottom: 20px; font-size: 14px; color: #666; }
        .breadcrumb-wrap a { color: #288ad6; text-decoration: none; }
        .detail-main { display: flex; gap: 30px; flex-wrap: wrap; }
        .detail-gallery { flex: 1; min-width: 300px; text-align: center; }x
        .detail-gallery img { max-width: 100%; border-radius: 8px; border: 1px solid #eee; }
        .detail-info { flex: 1.5; min-width: 300px; }
        .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #333; }
        .price-box { background: #f8f9fa; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
        .price-current { color: #d70018; font-size: 28px; font-weight: 800; }
        .price-old { color: #666; text-decoration: line-through; font-size: 16px; margin-left:10px; }
        .promo-tag { background: #fee2e2; color: #ef4444; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: 600; margin-left: 8px; }
        .box-info { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .box-info h3 { font-size: 18px; font-weight: 700; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .btn-buy-now { background: linear-gradient(180deg,#ffb8b8,#ff4d4d); color: #fff; font-weight: 700; font-size: 18px; border: none; padding: 12px 0; border-radius: 8px; width: 100%; transition: 0.3s; }
        .btn-buy-now:hover { opacity: 0.9; transform: translateY(-2px); }
        .stock-info { margin: 15px 0; font-size: 14px; }
        .stock-label { color: #22c55e; font-weight: 600; }
        .stock-out { color: #ef4444; font-weight: 600; }
        .desc-section { margin-top: 40px; border-top: 1px solid #eee; padding-top: 30px; }
        .desc-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 15px; }
        
        /* Quantity Selector */
        .quantity-selector { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .qty-btn { width: 36px; height: 36px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .qty-btn:hover { background: #f0f0f0; border-color: #bbb; }
        .qty-input { width: 60px; height: 36px; text-align: center; border: 1px solid #ddd; border-radius: 4px; font-weight: 700; }
        
        .stock-tag { font-size: 14px; margin-top: 8px; }
        .stock-label { color: #22c55e; font-weight: 600; }
        .stock-out { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: siteHeader}"></th:block>

<main class="product-detail-shell">
    <div class="detail-card">
        <div class="breadcrumb-wrap">
            <a href="/">Trang chủ</a> / 
            <span th:text="${product.category != null ? product.category.name : 'Điện thoại'}">Danh mục</span> /
            <span th:text="${product.name}">Tên sản phẩm</span>
        </div>

        <div class="detail-main">
            <div class="detail-gallery">
                <img th:if="${product.imageUrl}" th:src="@{/images/{img}(img=${product.imageUrl})}" th:alt="${product.name}">
                <div th:unless="${product.imageUrl}" style="height:300px; display:flex; align-items:center; justify-content:center; background:#f0f0f0; border-radius:8px;">
                    <span class="text-muted">Chưa có ảnh sản phẩm</span>
                </div>
            </div>

            <div class="detail-info">
                <h1 class="detail-title" th:text="${product.name}">Tên sản phẩm</h1>
                
                <div class="price-box">
                    <span class="price-current" th:text="${product.isDiscounted() ? product.discountedPriceFormatted : product.priceFormatted}">0đ</span>
                    <span class="price-old" th:if="${product.isDiscounted()}" th:text="${product.priceFormatted}">0đ</span>
                </div>

                <div class="box-info">
                    <h3>Thông tin sản phẩm</h3>
                    <div class="description-content" th:text="${product.description}">
                        Nội dung mô tả sản phẩm...
                    </div>
                </div>

                <div class="stock-tag">
                    Trạng thái: 
                    <span th:if="${product.promoStock != null and product.promoStock > 0}" class="stock-label" th:text="'Còn hàng (' + ${product.promoStock} + ')'">Còn hàng</span>
                    <span th:if="${product.promoStock == null}" class="stock-label">Còn hàng</span>
                    <span th:if="${product.promoStock != null and product.promoStock <= 0}" class="stock-out">Hết hàng</span>
                </div>

                <form th:action="@{/cart/add}" method="post" class="mt-4">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    
                    <div class="quantity-selector">
                        <span class="fw-bold">Số lượng:</span>
                        <button type="button" class="qty-btn" onclick="changeQty(-1)">-</button>
                        <input type="number" id="quantity" name="quantity" class="qty-input" value="1" min="1" th:max="${product.promoStock != null ? product.promoStock : 99}">
                        <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>

                    <button type="submit" class="btn-buy-now" th:disabled="${product.promoStock != null && product.promoStock <= 0}">
                        <i class="fas fa-cart-shopping me-2"></i> MUA NGAY
                    </button>
                </form>

            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function changeQty(delta) {
        const input = document.getElementById('quantity');
        let val = parseInt(input.value) || 1;
        val += delta;
        const min = parseInt(input.getAttribute('min')) || 1;
        const max = parseInt(input.getAttribute('max')) || 999;
        
        if (val < min) val = min;
        if (val > max) val = max;
        
        input.value = val;
    }
</script>
</body>
</html>
