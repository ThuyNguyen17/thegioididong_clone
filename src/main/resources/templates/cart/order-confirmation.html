<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận đơn hàng - Premium Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            color: var(--text-dark);
        }

        .confirm-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            padding: 40px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        .confirm-title { font-weight: 800; font-size: 2rem; margin-bottom: 8px; }
        .confirm-subtitle { color: var(--text-muted); margin-bottom: 32px; }

        .details-box {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { color: var(--text-muted); font-weight: 500; }
        .detail-value { font-weight: 700; color: var(--text-dark); }

        .btn-home {
            background: var(--text-dark);
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-home:hover { opacity: 0.9; transform: translateY(-2px); color: white; }

        .btn-outline {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            display: block;
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: siteHeader}"></th:block>

<main class="confirm-container">
    <div class="glass-card">
        <div class="success-icon">✓</div>
        <h1 class="confirm-title">Đặt hàng thành công!</h1>
        <p class="confirm-subtitle" th:text="${message}">Chúng tôi đã nhận được đơn hàng của bạn.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Mã đơn hàng</span>
                <span class="detail-value" th:text="${orderId != null ? '#' + orderId : '#' + #temporals.format(#temporals.createNow(), 'yyMMddHHmm')}">#12345</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Người nhận</span>
                <span class="detail-value" th:text="${customerName}">Khách hàng</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Trạng thái</span>
                <span class="detail-value text-success">Đang xử lý</span>
            </div>
            <div class="detail-row border-top pt-2 mt-2">
                <span class="detail-label text-dark">Tổng tiền</span>
                <span class="detail-value text-danger" style="font-size: 1.2rem;" th:text="${orderTotalFormatted}">0đ</span>
            </div>
        </div>

        <a href="/" class="btn-home">Quay lại trang chủ</a>
        <a th:href="@{/products}" class="btn-outline">Tiếp tục mua sắm</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
